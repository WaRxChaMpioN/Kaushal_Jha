<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ML-LBM velocity-field preview</title>
  <desc id="desc">A stylized scientific plot showing velocity magnitude streamlines through porous media.</desc>
  <defs>
