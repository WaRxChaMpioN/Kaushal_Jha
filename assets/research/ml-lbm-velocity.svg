    <path d="M38 115 C210 40 320 190 490 124 C665 56 757 105 925 72"/>
    <path d="M28 196 C195 160 305 288 455 232 C620 172 743 210 930 162"/>
    <path d="M34 282 C215 245 316 345 470 305 C630 260 770 296 926 250"/>
